services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wishlist-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wishlistdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── ASP.NET Core API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: WishlistApp.API/Dockerfile
    container_name: wishlist-api
    restart: unless-stopped
    ports:
      - '5000:8080'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Database=wishlistdb;Username=postgres;Password=postgres;
        Ssl Mode=Disable
      Jwt__Key: ${JWT_KEY:-dev-secret-key-minimum-32-characters!!}
      Jwt__Issuer: wishlist-api
      Jwt__Audience: wishlist-client
      AllowedOrigins: http://localhost:3000
      App__BaseUrl: http://localhost:3000
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME:-}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY:-}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET:-}
      MigrateOnStartup: 'true'
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wishlist-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: wishlist
    depends_on:
      - api

volumes:
  postgres_data:
