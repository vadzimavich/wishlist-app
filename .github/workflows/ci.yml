name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/WishlistApp.sln

      - name: Build
        run: dotnet build backend/WishlistApp.sln --no-restore -c Release

      # Раскомментируй когда добавишь тесты:
      # - name: Test
      #   run: dotnet test backend/WishlistApp.sln --no-build -c Release

  # ─── Docker smoke test ────────────────────────────────────────────────────
  docker:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build
        env:
          JWT_KEY: ci-test-secret-key-minimum-32-chars!!
